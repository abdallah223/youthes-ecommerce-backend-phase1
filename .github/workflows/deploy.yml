name: Node.js CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: "SHA256:jgt4VXc5WEXiERv/1ISs9T92/Is="
          script: |
            cd ~/youthes-ecommerce-backend-phase1
            git pull origin main
            npm install --production
            pm2 restart youthes-api || pm2 start index.js --name "youthes-api"
            pm2 save
